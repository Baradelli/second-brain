services:
  db:
    image: postgres:16
    container_name: cerebro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cerebro
      POSTGRES_PASSWORD: cerebro
      POSTGRES_DB: cerebro
    ports:
      - '5432:5432'
    volumes:
      - cerebro_pgdata:/var/lib/postgresql/data

volumes:
  cerebro_pgdata:
